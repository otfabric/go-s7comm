name: Release

run-name: Release (${{ inputs.bump }}) from ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

jobs:
  release:
    uses: otfabric/.github/.github/workflows/go-package-release.yml@v2
    with:
      bump: ${{ inputs.bump }}
      release-name-prefix: go-s7comm
      update-major-tag: false
    secrets: inherit
